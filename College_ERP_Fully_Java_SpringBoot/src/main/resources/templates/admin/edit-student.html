<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Student</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 0; }
        .navbar { background: #38ada9; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; }
        .container { width: 600px; margin: 40px auto; background: white; padding: 35px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #38ada9; text-align: center; margin-bottom: 25px; }
        .section-title { color: #38ada9; font-size: 15px; font-weight: bold; border-bottom: 2px solid #38ada9; padding-bottom: 5px; margin: 20px 0 15px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #333; font-size: 14px; }
        input, select { width: 100%; padding: 9px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus, select:focus { border-color: #38ada9; outline: none; }
        .row { display: flex; gap: 20px; }
        .row .field { flex: 1; }
        button { background: #38ada9; color: white; padding: 11px 30px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background: #78e08f; }
        a.back { display: block; text-align: center; margin-top: 15px; color: #38ada9; text-decoration: none; }
    </style>
</head>
<body>
<div class="navbar">
    <h2>College ERP — Edit Student</h2>
    <a href="/admin/students">⬅ Back to List</a>
</div>
<div class="container">
    <h2>✏️ Edit Student</h2>
    <form action="/admin/update-student" method="post">
        <input type="hidden" name="id" th:value="${student.id}">

        <div class="section-title">Personal Details</div>
        <div class="row">
            <div class="field">
                <label>Full Name</label>
                <input type="text" name="name" th:value="${student.name}" required>
            </div>
            <div class="field">
                <label>Enrollment No</label>
                <input type="text" name="enrollmentNo" th:value="${student.enrollmentNo}">
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Gender</label>
                <select name="gender">
                    <option th:selected="${student.gender == 'Male'}" value="Male">Male</option>
                    <option th:selected="${student.gender == 'Female'}" value="Female">Female</option>
                    <option th:selected="${student.gender == 'Other'}" value="Other">Other</option>
                </select>
            </div>
            <div class="field">
                <label>Date of Birth</label>
                <input type="date" name="dob" th:value="${student.dob}">
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Email</label>
                <input type="email" name="email" th:value="${student.email}" required>
            </div>
            <div class="field">
                <label>Phone</label>
                <input type="text" name="phone" th:value="${student.phone}">
            </div>
        </div>
        <label>Address</label>
        <input type="text" name="address" th:value="${student.address}">

        <div class="section-title">Academic Details</div>
        <div class="row">
            <div class="field">
                <label>Department</label>
                <input type="text" name="department" th:value="${student.department}" required>
            </div>
            <div class="field">
                <label>Year</label>
                <select name="year">
                    <option th:selected="${student.year == 'FY'}" value="FY">FY</option>
                    <option th:selected="${student.year == 'SY'}" value="SY">SY</option>
                    <option th:selected="${student.year == 'TY'}" value="TY">TY</option>
                </select>
            </div>
        </div>

        <div class="section-title">Login Username</div>
        <label>Username <small>(password change not available here)</small></label>
        <input type="text" name="username" th:value="${student.username}" readonly>

        <button type="submit">✅ Update Student</button>
    </form>
    <a class="back" href="/admin/students">Cancel</a>
</div>
</body>
</html>
