<!DOCTYPE html>
<html>
<head>
    <title>Faculty Dashboard</title>
    <style>
        body{font-family:Arial;background:#f4f4f4;margin:0;}
        .header{background:#8e44ad;color:white;padding:15px;font-size:22px;}
        .sidebar{width:200px;background:#2c3e50;color:white;height:100vh;position:fixed;padding:15px;}
        .sidebar a{display:block;color:white;text-decoration:none;padding:10px;margin:5px 0;}
        .sidebar a:hover{background:#34495e;}
        .content{margin-left:220px;padding:20px;}
        .card{background:white;padding:20px;border-radius:8px;box-shadow:0 0 10px gray;margin:10px;display:inline-block;width:200px;}
    </style>
</head>
<body>

<div class="header">College ERP - Faculty Dashboard</div>

<div class="sidebar">
    <h3>Faculty Menu</h3>
    <a href="#">My Classes</a>
    <a href="#">Attendance</a>
    <a href="#">Upload Marks</a>
    <a href="#">Research</a>
    <a href="/">Logout</a>
</div>

<div class="content">
    <h2>Welcome Faculty</h2>

    <div class="card"><h3>Total Classes</h3><p>5</p></div>
    <div class="card"><h3>Pending Grading</h3><p>30</p></div>
    <div class="card"><h3>Leave Balance</h3><p>12 days</p></div>

</div>

</body>
</html>
