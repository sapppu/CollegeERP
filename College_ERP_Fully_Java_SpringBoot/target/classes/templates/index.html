<!DOCTYPE html>
<html>
<head>
    <title>College ERP System</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right,#1e3799,#4a69bd);
            margin:0;
            color:white;
            text-align:center;
        }

        .container{
            margin-top:120px;
        }

        h1{
            font-size:40px;
            margin-bottom:10px;
        }

        h2{
            font-weight:normal;
            margin-bottom:40px;
        }

        .card-box{
            display:flex;
            justify-content:center;
            gap:40px;
            flex-wrap:wrap;
        }

        .card{
            background:white;
            color:#1e3799;
            width:220px;
            padding:25px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
            text-decoration:none;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
            background:#f1f2f6;
        }

        .emoji{
            font-size:50px;
        }

        .role{
            font-size:22px;
            font-weight:bold;
            margin-top:10px;
        }

        .footer{
            position:fixed;
            bottom:10px;
            width:100%;
            font-size:14px;
            opacity:0.8;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎓 College ERP System</h1>
    <h2>Select Your Role to Continue</h2>

    <div class="card-box">

        <a href="/login" class="card">
            <div class="emoji">👨‍💼</div>
            <div class="role">Admin Login</div>
        </a>

        <a href="/login" class="card">
            <div class="emoji">👨‍🎓</div>
            <div class="role">Student Login</div>
        </a>

        <a href="/login" class="card">
            <div class="emoji">👩‍🏫</div>
            <div class="role">Faculty Login</div>
        </a>

    </div>
</div>

<div class="footer">
    College ERP © 2026
</div>

</body>
</html>
