<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 0; }
        .navbar { background: #1e3799; padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .navbar a { color: white; text-decoration: none; font-weight: bold; }
        .container { width: 600px; margin: 40px auto; background: white; padding: 35px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1e3799; text-align: center; margin-bottom: 25px; }
        .section-title { color: #1e3799; font-size: 15px; font-weight: bold; border-bottom: 2px solid #1e3799; padding-bottom: 5px; margin: 20px 0 15px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #333; font-size: 14px; }
        input, select { width: 100%; padding: 9px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        input:focus, select:focus { border-color: #1e3799; outline: none; }
        .row { display: flex; gap: 20px; }
        .row .field { flex: 1; }
        button { background: #1e3799; color: white; padding: 11px 30px; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background: #4a69bd; }
        a.back { display: block; text-align: center; margin-top: 15px; color: #1e3799; text-decoration: none; }
    </style>
</head>
<body>
<div class="navbar">
    <h2>College ERP — Add Student</h2>
    <a href="/admin/dashboard">⬅ Back to Dashboard</a>
</div>
<div class="container">
    <h2>➕ Add New Student</h2>
    <form action="/admin/save-student" method="post">

        <div class="section-title">Personal Details</div>
        <div class="row">
            <div class="field">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter full name" required>
            </div>
            <div class="field">
                <label>Enrollment No</label>
                <input type="text" name="enrollmentNo" placeholder="e.g. EN2024001" required>
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Gender</label>
                <select name="gender">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="field">
                <label>Date of Birth</label>
                <input type="date" name="dob">
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter email" required>
            </div>
            <div class="field">
                <label>Phone</label>
                <input type="text" name="phone" placeholder="Enter phone number">
            </div>
        </div>
        <label>Address</label>
        <input type="text" name="address" placeholder="Enter address">

        <div class="section-title">Academic Details</div>
        <div class="row">
            <div class="field">
                <label>Department</label>
                <select name="department" required>
                    <option value="">-- Select Department --</option>
                    <option th:each="dept : ${departments}"
                            th:value="${dept.name}"
                            th:text="${dept.name}">
                    </option>
                </select>
            </div>
            <div class="field">
                <label>Year</label>
                <select name="year">
                    <option value="FY">FY</option>
                    <option value="SY">SY</option>
                    <option value="TY">TY</option>
                </select>
            </div>
        </div>
        <div class="section-title">Login Credentials</div>
        <div class="row">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Assign username" required>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Assign password" required>
            </div>
        </div>

        <button type="submit">💾 Save Student</button>
    </form>
    <a class="back" href="/admin/students">View All Students</a>
</div>
</body>
</html>
