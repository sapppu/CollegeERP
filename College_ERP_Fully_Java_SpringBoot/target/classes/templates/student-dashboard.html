<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <style>
        body{font-family:Arial;background:#f4f4f4;margin:0;}
        .header{background:#16a085;color:white;padding:15px;font-size:22px;}
        .sidebar{width:200px;background:#2c3e50;color:white;height:100vh;position:fixed;padding:15px;}
        .sidebar a{display:block;color:white;text-decoration:none;padding:10px;margin:5px 0;}
        .sidebar a:hover{background:#34495e;}
        .content{margin-left:220px;padding:20px;}
        .card{background:white;padding:20px;border-radius:8px;box-shadow:0 0 10px gray;margin:10px;display:inline-block;width:200px;}
    </style>
</head>
<body>

<div class="header">College ERP - Student Dashboard</div>

<div class="sidebar">
    <h3>Student Menu</h3>
    <a href="#">Profile</a>
    <a href="#">Attendance</a>
    <a href="#">Marks</a>
    <a href="#">Fees</a>
    <a href="#">Library</a>
    <a href="/">Logout</a>
</div>

<div class="content">
    <h2>Welcome Student</h2>

    <div class="card"><h3>Attendance</h3><p>92%</p></div>
    <div class="card"><h3>CGPA</h3><p>8.4</p></div>
    <div class="card"><h3>Pending Fees</h3><p>₹10,000</p></div>

</div>

</body>
</html>
