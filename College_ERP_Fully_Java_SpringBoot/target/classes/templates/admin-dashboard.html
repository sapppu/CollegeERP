<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial; background:#f4f4f4; margin:0; }
        .header {
            background:#1e3799;
            color:white;
            padding:15px;
            font-size:22px;
        }
        .sidebar {
            width:200px;
            background:#2c3e50;
            color:white;
            height:100vh;
            position:fixed;
            padding:15px;
        }
        .sidebar a {
            display:block;
            color:white;
            text-decoration:none;
            padding:10px;
            margin:5px 0;
        }
        .sidebar a:hover { background:#34495e; }
        .content {
            margin-left:220px;
            padding:20px;
        }
        .card {
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 0 10px gray;
            margin:10px;
            display:inline-block;
            width:200px;
        }
    </style>
</head>
<body>

<div class="header">College ERP - Admin Dashboard</div>

<div class="sidebar">
    <h3>Admin Menu</h3>

    <a href="/admin/add-user">➕ Add Student / Faculty</a>
    <a href="#">Students</a>
    <a href="#">Faculty</a>
    <a href="#">Departments</a>
    <a href="#">Courses</a>
    <a href="#">Fees</a>
    <a href="#">Reports</a>

    <a href="/logout">Logout</a>
</div>


<div class="content">
    <h2>Welcome Admin</h2>

    <div class="card">
        <h3>Total Students</h3>
        <p>1200</p>
    </div>

    <div class="card">
        <h3>Total Faculty</h3>
        <p>85</p>
    </div>

    <div class="card">
        <h3>Departments</h3>
        <p>12</p>
    </div>

    <div class="card">
        <h3>Pending Fees</h3>
        <p>₹ 2,50,000</p>
    </div>

</div>

</body>
</html>
